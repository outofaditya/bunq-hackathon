<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PlanFinder · Compare Plans</title>
<style>
  :root { --bg: #fdf6ee; --card: #fff; --ink: #1d1f24; --muted: #6e7682; --accent: #ff6a4d; --line: #ecdcc6; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font: 16px/1.5 "SF Pro Display", "Inter", system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  header { padding: 24px 40px; background: var(--card); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; }
  header .logo { font: 700 24px/1 system-ui; letter-spacing: -0.02em; }
  header .logo span { color: var(--accent); }
  header .tag { margin-left: auto; font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  main { max-width: 1080px; margin: 0 auto; padding: 40px 32px 80px; }
  h1 { font: 700 36px/1.1 system-ui; letter-spacing: -0.02em; margin: 0 0 8px; }
  .subtitle { color: var(--muted); font-size: 16px; margin: 0 0 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .plan { background: var(--card); border-radius: 18px; padding: 22px; border: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; transition: transform 0.15s, box-shadow 0.15s; }
  .plan:hover { transform: translateY(-2px); box-shadow: 0 18px 40px -20px rgba(255,106,77,0.20); }
  .plan .provider { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .plan .name { font: 600 20px/1.2 system-ui; letter-spacing: -0.01em; }
  .plan .features { color: var(--muted); font-size: 13px; flex: 1; }
  .plan .price { color: var(--accent); font-weight: 700; font-size: 22px; margin-top: 8px; }
  .plan .price small { color: var(--muted); font-weight: 500; font-size: 13px; }
  .plan button { margin-top: 12px; }

  .btn { background: var(--accent); color: #fff; border: 0; border-radius: 999px; padding: 12px 22px; font: 600 15px/1 system-ui; cursor: pointer; transition: filter 0.15s, transform 0.05s; }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }

  .confirm-card { background: var(--card); border-radius: 22px; padding: 32px; border: 1px solid var(--line); margin-bottom: 24px; }
  .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .summary-row:last-child { border-bottom: 0; }
  .summary-row .k { color: var(--muted); }
  .summary-row .v { font-weight: 600; }
  .total-row { padding-top: 18px; }
  .total-row .v { font-size: 24px; color: var(--accent); font-weight: 700; }

  .done-card { background: var(--card); border-radius: 22px; padding: 48px; border: 1px solid var(--line); text-align: center; }
  .done-card .check { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 999px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 38px; font-weight: 700; }
  .done-card h2 { font: 700 28px/1.2 system-ui; margin: 0 0 8px; letter-spacing: -0.01em; }
  .done-card p { color: var(--muted); margin: 0 0 16px; }
  .ref-badge { display: inline-block; background: var(--bg); border: 1px solid var(--line); padding: 8px 16px; border-radius: 999px; font: 500 13px/1 ui-monospace, monospace; color: var(--muted); margin-top: 12px; }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Plan<span>Finder</span></div>
  <div class="tag" id="screen-tag">Compare</div>
</header>

<main>
  <section id="screen-list">
    <h1><span id="cat-name">Streaming</span> plans</h1>
    <p class="subtitle">Pick the cheapest plan within your budget · monthly billing · cancel anytime</p>
    <div class="grid" id="plans"></div>
  </section>

  <section id="screen-confirm" class="hidden">
    <button class="btn ghost" id="btn-back-list" style="margin-bottom: 18px;">← Back to plans</button>
    <div class="confirm-card">
      <div class="summary-row"><span class="k">Provider</span><span class="v" id="c-provider">…</span></div>
      <div class="summary-row"><span class="k">Plan</span><span class="v" id="c-plan">…</span></div>
      <div class="summary-row"><span class="k">Includes</span><span class="v" id="c-features">…</span></div>
      <div class="summary-row total-row"><span class="k">Monthly</span><span class="v" id="c-monthly">€--</span></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-confirm">Confirm subscription</button>
    </div>
  </section>

  <section id="screen-done" class="hidden">
    <div class="done-card">
      <div class="check">✓</div>
      <h2>Subscription active</h2>
      <p>You'll be charged on the same day each month.</p>
      <div class="meta" style="font-size:14px;color:var(--muted)">Monthly cost</div>
      <div class="ref-badge" id="done-monthly" style="font-size:24px;color:var(--accent);font-weight:700;border:0;">€--</div>
      <div style="font-size:14px;color:var(--muted);margin-top:8px;" id="done-line">…</div>
      <div class="ref-badge" id="done-ref">REF: ……</div>
    </div>
  </section>
</main>

<script>
const PLANS = __PLANS__;
const CATEGORY = "__CATEGORY__";

const $ = (id) => document.getElementById(id);
const screens = ["screen-list", "screen-confirm", "screen-done"];
const TAGS = { "screen-list": "Compare", "screen-confirm": "Confirm", "screen-done": "Active" };
const state = { plan: null };

function show(id) {
  screens.forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));
  $("screen-tag").textContent = TAGS[id] || "";
}
function fmtEur(v) { return "€" + Number(v).toFixed(2); }

function renderList() {
  $("cat-name").textContent = CATEGORY.charAt(0).toUpperCase() + CATEGORY.slice(1);
  const root = $("plans");
  root.innerHTML = "";
  for (const p of PLANS) {
    const el = document.createElement("div");
    el.className = "plan";
    el.innerHTML = `
      <div class="provider">${p.provider}</div>
      <div class="name">${p.plan}</div>
      <div class="features">${p.features}</div>
      <div class="price">${fmtEur(p.monthly)}<small>/month</small></div>
      <button class="btn" data-pick="${p.id}">Subscribe ${fmtEur(p.monthly)}/mo</button>
    `;
    el.querySelector("[data-pick]").addEventListener("click", () => pick(p));
    root.appendChild(el);
  }
}

function pick(p) {
  state.plan = p;
  $("c-provider").textContent = p.provider;
  $("c-plan").textContent = p.plan;
  $("c-features").textContent = p.features;
  $("c-monthly").textContent = fmtEur(p.monthly) + "/month";
  show("screen-confirm");
}

function confirm() {
  const ref = "PF-" + Math.random().toString(36).slice(2, 8).toUpperCase();
  $("done-monthly").textContent = fmtEur(state.plan.monthly);
  $("done-line").textContent = `${state.plan.provider} · ${state.plan.plan}`;
  $("done-ref").textContent = "REF: " + ref;
  document.body.dataset.subscriptionStatus = "active";
  document.body.dataset.subscriptionService = state.plan.provider;
  document.body.dataset.subscriptionPlan = state.plan.plan;
  document.body.dataset.subscriptionMonthly = String(state.plan.monthly);
  document.body.dataset.subscriptionRef = ref;
  show("screen-done");
}

$("btn-back-list").addEventListener("click", () => show("screen-list"));
$("btn-confirm").addEventListener("click", confirm);

renderList();
show("screen-list");
</script>
</body>
</html>
