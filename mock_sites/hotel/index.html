<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StaySora · Book a Hotel</title>
<style>
  :root { --bg: #0e1428; --card: #fff; --ink: #0e1428; --muted: #6e7682; --accent: #4055ff; --line: #d6dcec; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font: 16px/1.5 "SF Pro Display", "Inter", system-ui, sans-serif; background: linear-gradient(180deg, #f3f5fb 0%, #e9edfa 100%); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  header { padding: 24px 40px; background: var(--card); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; }
  header .logo { font: 700 24px/1 system-ui; letter-spacing: -0.02em; }
  header .logo span { color: var(--accent); }
  header .tag { margin-left: auto; font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  main { max-width: 980px; margin: 0 auto; padding: 40px 32px 80px; }
  h1 { font: 700 36px/1.1 system-ui; letter-spacing: -0.02em; margin: 0 0 8px; }
  .subtitle { color: var(--muted); font-size: 16px; margin: 0 0 32px; }
  .hotels { display: grid; gap: 16px; }
  .hotel { background: var(--card); border-radius: 18px; padding: 24px; display: grid; grid-template-columns: 96px 1fr auto; gap: 24px; align-items: center; border: 1px solid var(--line); transition: transform 0.15s, box-shadow 0.15s; }
  .hotel:hover { transform: translateY(-2px); box-shadow: 0 18px 40px -20px rgba(40,55,255,0.20); }
  .hotel .photo { width: 96px; height: 96px; border-radius: 14px; display: grid; place-items: center; font-size: 44px; background: linear-gradient(135deg, #c8d4ff, #8195ff); }
  .hotel .name { font: 600 22px/1.2 system-ui; letter-spacing: -0.01em; }
  .hotel .area { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .hotel .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .hotel .price { color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; margin-top: 8px; }
  .btn { background: var(--accent); color: #fff; border: 0; border-radius: 999px; padding: 12px 24px; font: 600 15px/1 system-ui; cursor: pointer; transition: filter 0.15s, transform 0.05s; }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }

  .detail-card { background: var(--card); border-radius: 22px; padding: 32px; border: 1px solid var(--line); display: grid; grid-template-columns: 160px 1fr; gap: 32px; align-items: start; margin-bottom: 24px; }
  .detail-card .photo { width: 160px; height: 160px; border-radius: 18px; display: grid; place-items: center; font-size: 72px; background: linear-gradient(135deg, #c8d4ff, #8195ff); }
  .detail-card h2 { margin: 0 0 6px; font: 700 28px/1.1 system-ui; letter-spacing: -0.01em; }
  .detail-card .meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
  .detail-card .price-line b { color: var(--accent); font-size: 20px; }

  .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .summary-row:last-child { border-bottom: 0; }
  .summary-row .k { color: var(--muted); }
  .summary-row .v { font-weight: 600; }
  .total-row { padding-top: 18px; }
  .total-row .k { font-weight: 700; font-size: 16px; }
  .total-row .v { font-size: 24px; color: var(--accent); font-weight: 700; }

  .done-card { background: var(--card); border-radius: 22px; padding: 48px; border: 1px solid var(--line); text-align: center; }
  .done-card .check { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 999px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 38px; font-weight: 700; }
  .done-card h2 { font: 700 28px/1.2 system-ui; margin: 0 0 8px; letter-spacing: -0.01em; }
  .done-card p { color: var(--muted); margin: 0 0 16px; }
  .done-total { font: 700 38px/1 system-ui; color: var(--accent); margin: 16px 0 4px; letter-spacing: -0.02em; }
  .ref-badge { display: inline-block; background: #f3f5fb; border: 1px solid var(--line); padding: 8px 16px; border-radius: 999px; font: 500 13px/1 ui-monospace, monospace; color: var(--muted); margin-top: 12px; }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Stay<span>Sora</span></div>
  <div class="tag" id="screen-tag">Browse</div>
</header>

<main>
  <section id="screen-list">
    <h1>Hotels in <span id="city-name">Tokyo</span></h1>
    <p class="subtitle">For <span id="nights-count">3</span> night(s) · Friday check-in · 2 guests</p>
    <div class="hotels" id="hotels"></div>
  </section>

  <section id="screen-confirm" class="hidden">
    <button class="btn ghost" id="btn-back-list" style="margin-bottom: 18px;">← Back to hotels</button>
    <div class="detail-card">
      <div class="photo" id="d-photo">🏨</div>
      <div>
        <h2 id="d-name">…</h2>
        <div class="meta" id="d-meta">…</div>
        <div class="price-line">Per night: <b id="d-nightly">€--</b></div>
      </div>
    </div>
    <div class="detail-card" style="grid-template-columns: 1fr;">
      <div>
        <div class="summary-row"><span class="k">Hotel</span><span class="v" id="c-name">…</span></div>
        <div class="summary-row"><span class="k">Nights</span><span class="v" id="c-nights">--</span></div>
        <div class="summary-row"><span class="k">Per-night</span><span class="v" id="c-nightly">€--</span></div>
        <div class="summary-row total-row"><span class="k">Total</span><span class="v" id="c-total">€--</span></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-confirm">Confirm booking</button>
    </div>
  </section>

  <section id="screen-done" class="hidden">
    <div class="done-card">
      <div class="check">✓</div>
      <h2>Hotel booked</h2>
      <p>You're all set. We've emailed the reservation.</p>
      <div class="meta" style="font-size:14px;color:var(--muted)">Total charged</div>
      <div class="done-total" id="done-total">€--</div>
      <div class="meta" style="font-size:14px;color:var(--muted)" id="done-line">…</div>
      <div class="ref-badge" id="done-ref">REF: ……</div>
    </div>
  </section>
</main>

<script>
const HOTELS = __HOTELS__;
const CITY = "__CITY__";
const NIGHTS = __NIGHTS__;

const $ = (id) => document.getElementById(id);
const screens = ["screen-list", "screen-confirm", "screen-done"];
const TAGS = { "screen-list": "Browse", "screen-confirm": "Confirm", "screen-done": "Done" };
const state = { hotel: null };

function show(id) {
  screens.forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));
  $("screen-tag").textContent = TAGS[id] || "";
}
function fmtEur(v) { return "€" + Number(v).toFixed(0); }

function renderList() {
  $("city-name").textContent = CITY;
  $("nights-count").textContent = NIGHTS;
  const root = $("hotels");
  root.innerHTML = "";
  for (const h of HOTELS) {
    const total = h.nightly * NIGHTS;
    const el = document.createElement("div");
    el.className = "hotel";
    el.innerHTML = `
      <div class="photo">${h.emoji}</div>
      <div>
        <div class="name">${h.name}</div>
        <div class="area">${h.area}</div>
        <div class="meta">${h.meta}</div>
        <div class="price" style="margin-top:8px">${fmtEur(h.nightly)}/night · total ${fmtEur(total)}</div>
      </div>
      <button class="btn" data-pick="${h.id}">Book ${fmtEur(total)}</button>
    `;
    el.querySelector("[data-pick]").addEventListener("click", () => pick(h));
    root.appendChild(el);
  }
}

function pick(h) {
  state.hotel = h;
  $("d-photo").textContent = h.emoji;
  $("d-name").textContent = h.name;
  $("d-meta").textContent = h.area + " · " + h.meta;
  $("d-nightly").textContent = fmtEur(h.nightly);
  $("c-name").textContent = h.name;
  $("c-nights").textContent = NIGHTS;
  $("c-nightly").textContent = fmtEur(h.nightly);
  $("c-total").textContent = fmtEur(h.nightly * NIGHTS);
  show("screen-confirm");
}

function confirm() {
  const ref = "ST-" + Math.random().toString(36).slice(2, 8).toUpperCase();
  const total = state.hotel.nightly * NIGHTS;
  $("done-total").textContent = fmtEur(total);
  $("done-line").textContent = `${state.hotel.name} · ${NIGHTS} night(s) · ${CITY}`;
  $("done-ref").textContent = "REF: " + ref;
  document.body.dataset.bookingStatus = "confirmed";
  document.body.dataset.bookingHotel = state.hotel.name;
  document.body.dataset.bookingPrice = String(total);
  document.body.dataset.bookingRef = ref;
  document.body.dataset.bookingNights = String(NIGHTS);
  show("screen-done");
}

$("btn-back-list").addEventListener("click", () => show("screen-list"));
$("btn-confirm").addEventListener("click", confirm);

renderList();
show("screen-list");
</script>
</body>
</html>
